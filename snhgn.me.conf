# ============================================================
# Nginx config for snhgn.me
# Hybrid mode: static files + Node.js proxy for Keystatic Admin
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name snhgn.me www.snhgn.me 192.168.1.43;

    # --- Static site (primary) ---
    root /home/a/web;
    index index.html;

    # --- Keystatic Admin + API: proxy to Node.js server ---
    location /keystatic {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static files with clean URLs ---
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # --- Error pages ---
    error_page 404 /404.html;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # --- Cache static assets ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
